    // ===== CSVレポート =====

    function parseCSVLine(line) {
      const cols = [];
      let inQuote = false, cur = '';
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { cols.push(cur); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur);
      return cols;
    }

    function matchCode(csvCode, keyCode) {
      csvCode = String(csvCode).trim();
      keyCode = String(keyCode || '').trim();
      if (!csvCode || !keyCode) return false;
      if (csvCode === keyCode) return true;
      if (keyCode.startsWith(csvCode)) return true;
      if (csvCode.length >= 5 && keyCode.length >= 5 &&
        csvCode.slice(0, 5) === keyCode.slice(0, 5)) {
        return parseInt(csvCode.slice(5), 10) === parseInt(keyCode.slice(5), 10);
      }
      return false;
    }

    async function loadCSVReport(file) {
      const btn = document.getElementById('csvReportBtn');
      btn.style.pointerEvents = 'none';
      btn.textContent = '⏳ 読み込み中...';
      btn.classList.remove('active');

      try {
        const buf = await file.arrayBuffer();
        const text = decodeBytesAuto(new Uint8Array(buf));
        const lines = text.split(/\r?\n/);
        if (lines.length < 2) throw new Error('データが見つかりません');

        const towns = [];
        const seenCodes = new Set();
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const cols = parseCSVLine(line);
          const code = (cols[1] || '').trim();
          const prefName = (cols[2] || '').trim();
          const cityName = (cols[3] || '').trim();
          const townName = (cols[4] || '').trim();
          const statHouseholds = parseInt((cols[5] || '').replace(/,/g, ''), 10) || 0;
          const deliveryHouseholds = parseInt((cols[6] || '').replace(/,/g, ''), 10) || 0;
          if (code && /^\d+$/.test(code) && !seenCodes.has(code)) {
            seenCodes.add(code);
            towns.push({ code, prefName, cityName, townName, statHouseholds, deliveryHouseholds });
          }
        }
        if (!towns.length) throw new Error('有効な住所コードが見つかりません');

        // 既存の町丁目レイヤーをクリア
        Object.values(townLayers).forEach(g => { if (map.hasLayer(g)) map.removeLayer(g); });
        // 市区町村レイヤーを非表示
        Object.values(cityGroups).forEach(g => { if (map.hasLayer(g)) map.removeLayer(g); });

        csvTowns = towns;
        csvMode = true;
        townLayers = {};
        townFilterText = '';
        townVisibility = {};
        csvTowns.forEach(t => { townVisibility[t.code] = true; });

        // UIをCSVモードに切り替え
        document.getElementById('boundarySectionTitle').textContent = '住所コード';
        document.getElementById('cityFilterInput').placeholder = '町丁目名で絞り込み';
        document.getElementById('cityFilterInput').value = '';
        document.getElementById('boundarySection').style.display = 'flex';
        document.getElementById('city-resizer').style.display = 'block';
        document.getElementById('cityListHeader').innerHTML =
          '<div class="h-toggle"></div>' +
          '<span class="h-name">町丁目名</span>' +
          '<span class="h-stat">統計上<br>世帯数</span>' +
          '<span class="h-stat">配達見込<br>世帯数</span>';
        document.getElementById('cityListHeader').style.display = 'flex';

        if (Object.keys(allFeaturesByCode).length > 0) {
          applyCSVFilter();
        } else {
          updateTownList();
        }

        document.getElementById('csvReportGroup').classList.add('loaded');
        btn.textContent = '📊 住所コード読み込み';
        btn.classList.add('active');
      } catch (e) {
        console.error(e);
        alert(`CSVの読み込みに失敗しました。\n${e.message}`);
        btn.textContent = '📊 住所コード読み込み';
      } finally {
        btn.style.pointerEvents = '';
      }
    }

    function clearCSVReport() {
      if (!confirm('住所コードの読み込みをキャンセルしますか？')) return;

      Object.values(townLayers).forEach(g => { if (map.hasLayer(g)) map.removeLayer(g); });
      townLayers = {};
      csvTowns = [];
      csvMode = false;
      townFilterText = '';
      townVisibility = {};

      document.getElementById('csvReportGroup').classList.remove('loaded');
      const btn = document.getElementById('csvReportBtn');
      btn.textContent = '📊 住所コード読み込み';
      btn.classList.remove('active');

      // 境界（市区町村）表示に戻す
      document.getElementById('boundarySectionTitle').textContent = '境界設定';
      document.getElementById('cityFilterInput').placeholder = '市区町村で絞り込み';
      document.getElementById('cityFilterInput').value = '';
      cityFilterText = '';

      if (Object.keys(cityGroups).length > 0) {
        document.getElementById('boundarySection').style.display = 'flex';
        document.getElementById('city-resizer').style.display = 'block';
        Object.entries(cityGroups).forEach(([key, g]) => {
          if (cityVisibility[key] && !map.hasLayer(g)) g.addTo(map);
        });
        updateCityList();
      } else {
        document.getElementById('boundarySection').style.display = 'none';
        document.getElementById('city-resizer').style.display = 'none';
      }
    }

    function applyCSVFilter() {
      Object.values(townLayers).forEach(g => { if (map.hasLayer(g)) map.removeLayer(g); });
      townLayers = {};

      const fillOp = cityFillOpacity;
      const townStyle = () => ({ fillColor: '#FFFBBB', fillOpacity: fillOp, color: '#DBC900', weight: 1.5, opacity: 0.9 });

      csvTowns.forEach(town => {
        const matched = [];
        for (const [code, features] of Object.entries(allFeaturesByCode)) {
          if (matchCode(town.code, code)) { matched.push(...features); break; }
        }
        if (!matched.length) return;

        const layer = L.geoJSON({ type: 'FeatureCollection', features: matched }, {
          style: townStyle, pane: 'boundaryPane', renderer: boundaryCanvasRenderer,
          onEachFeature: (feat, lyr) => {
            const p = feat.properties || {};
            const label = [p.CITY_NAME, p.S_NAME].filter(Boolean).join(' ') || p.name || town.townName || '';
            if (label) {
              lyr.on('mouseover', e => {
                _balloonLocked = true;
                showBalloon(null, label, '', e.originalEvent.clientX, e.originalEvent.clientY, 'cursor');
              });
              lyr.on('mousemove', e => showBalloon(null, label, '', e.originalEvent.clientX, e.originalEvent.clientY, 'cursor'));
              lyr.on('mouseout', hideBalloon);
            }
            lyr.on('mouseover', () => lyr.setStyle({ fillOpacity: Math.min(1, fillOp + 0.25), weight: 2.5 }));
            lyr.on('mouseout', () => layer.resetStyle(lyr));
          },
        });
        townLayers[town.code] = layer;
        if (townVisibility[town.code]) layer.addTo(map);
      });

      updateTownList();
    }

    function updateTownList() {
      const el = document.getElementById('cityList');
      el.innerHTML = '';

      if (Object.keys(allFeaturesByCode).length === 0) {
        el.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--text-muted);text-align:center">境界データを先に読み込んでください</div>';
        document.getElementById('cityCount').textContent = `${csvTowns.length}件`;
        return;
      }

      const matchedCount = csvTowns.filter(t => townLayers[t.code]).length;
      document.getElementById('cityCount').textContent = `${matchedCount}/${csvTowns.length}件`;

      const q = townFilterText.toLowerCase();
      const filtered = csvTowns.filter(t =>
        !q || t.townName.toLowerCase().includes(q) || t.cityName.toLowerCase().includes(q)
      );

      filtered.forEach(town => {
        const hasLayer = !!townLayers[town.code];
        const on = hasLayer && townVisibility[town.code];
        const row = document.createElement('div');
        row.className = 'city-row' + (!hasLayer ? ' grayed' : '');

        const tog = document.createElement('div');
        tog.className = 'city-toggle' + (on ? ' on' : '');
        if (hasLayer) {
          tog.addEventListener('click', e => { e.stopPropagation(); toggleTown(town.code, !townVisibility[town.code]); });
        }

        const nm = document.createElement('span');
        nm.className = 'city-name';
        nm.innerHTML = (town.cityName ? `<span style="font-size:9px;color:var(--text-muted);margin-right:3px">${town.cityName}</span>` : '')
          + (town.townName || town.code);

        const st = document.createElement('span');
        st.className = 'city-stat';
        st.title = '統計上世帯数';
        st.textContent = town.statHouseholds > 0 ? town.statHouseholds.toLocaleString() : '—';

        const dl = document.createElement('span');
        dl.className = 'city-stat';
        dl.title = '配達見込み世帯数';
        dl.textContent = town.deliveryHouseholds > 0 ? town.deliveryHouseholds.toLocaleString() : '—';

        row.appendChild(tog);
        row.appendChild(nm);
        row.appendChild(st);
        row.appendChild(dl);
        if (hasLayer) row.addEventListener('click', () => toggleTown(town.code, !townVisibility[town.code]));
        el.appendChild(row);
      });

      if (!el.children.length)
        el.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:var(--text-muted)">該当なし</div>';
    }

    function toggleTown(code, show) {
      townVisibility[code] = show;
      const g = townLayers[code];
      if (!g) return;
      if (show && !map.hasLayer(g)) {
        g.addTo(map);
        const b = g.getBounds();
        if (b.isValid()) map.fitBounds(b, { padding: [40, 40], maxZoom: 17, animate: false });
      }
      else if (!show && map.hasLayer(g)) map.removeLayer(g);
      updateTownList();
    }

    function bulkTownVisibility(show) {
      csvTowns.forEach(town => {
        townVisibility[town.code] = show;
        const g = townLayers[town.code];
        if (!g) return;
        if (show && !map.hasLayer(g)) g.addTo(map);
        else if (!show && map.hasLayer(g)) map.removeLayer(g);
      });
      updateTownList();
    }

    function onTownFilter(val) { townFilterText = val; updateTownList(); }

    // ===== 情報吹き出し（自作div・全種類共通） =====
    const HOVER_PX = 8;    // ヒット半径（ピクセル）
    const MIN_ZOOM_HOVER = 13;  // このズーム未満は無効

    const hoverTip = document.getElementById('hover-tooltip');
    const htLabel = hoverTip.querySelector('.ht-label');
    const htTime = hoverTip.querySelector('.ht-time');
    let _hoverRaf = null;
    let _lastHoverE = null;
    let _balloonLocked = false;    // マーカー/町丁目ホバー表示中はtrue（軌跡ホバーを抑止）

    function fmtTime(ms) {
      if (!ms) return '日時不明';
      const d = new Date(ms);
      const z = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${z(d.getMonth() + 1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
    }

    function fmtDuration(ms) {
      const totalMin = Math.round(ms / 60000);
      const h = Math.floor(totalMin / 60), m = totalMin % 60;
      if (h > 0) return m > 0 ? `${h}時間${m}分` : `${h}時間`;
      return `${m}分`;
    }

    // idxの点に到達する直前の区間速度（無ければ次の区間で代用、両方無効なら null）
    function nearestSpeed(key, idx) {
      const speeds = GPX_SPEEDS[key];
      if (!speeds) return null;
      if (idx > 0 && speeds[idx - 1] >= 0) return speeds[idx - 1];
      if (idx < speeds.length && speeds[idx] >= 0) return speeds[idx];
      return null;
    }

    function fmtSpeed(kmh) {
      return kmh == null ? '—' : `${kmh.toFixed(1)} km/h`;
    }

    // マーカーの地図座標をビューポート基準の画面座標に変換
    function markerScreenPos(marker) {
      const pt = map.latLngToContainerPoint(marker.getLatLng());
      const rect = map.getContainer().getBoundingClientRect();
      return { x: rect.left + pt.x, y: rect.top + pt.y };
    }

    // anchor: 'cursor'（カーソル右上）| 'top'（指定座標の真上中央）
    function positionBalloon(x, y, anchor) {
      hoverTip.style.visibility = 'hidden';
      hoverTip.style.display = 'block';
      const tw = hoverTip.offsetWidth, th = hoverTip.offsetHeight;
      let nx, ny;
      if (anchor === 'top') {
        nx = x - tw / 2;
        ny = y - th - 14;
        if (ny < 6) ny = y + 14;
      } else {
        nx = x + 14;
        ny = y - th - 8;
        if (nx + tw > window.innerWidth) nx = x - tw - 14;
        if (ny < 6) ny = y + 14;
      }
      nx = Math.max(4, Math.min(nx, window.innerWidth - tw - 4));
      hoverTip.style.left = nx + 'px';
      hoverTip.style.top = ny + 'px';
      hoverTip.style.visibility = '';
    }

    // color: 端末色（nullなら無着色）, detailHtml: 2行目（空文字なら非表示）
    function showBalloon(color, label, detailHtml, x, y, anchor) {
      htLabel.style.color = color || '';
      htLabel.textContent = label;
      htTime.innerHTML = detailHtml || '';
      htTime.style.display = detailHtml ? '' : 'none';
      positionBalloon(x, y, anchor);
    }

    function hideBalloon() {
      hoverTip.style.display = 'none';
      _balloonLocked = false;
    }

    function doHoverSearch(e) {
      if (_balloonLocked) return;
      if (map.getZoom() < MIN_ZOOM_HOVER) { hideBalloon(); return; }

      const mp = e.containerPoint;
      const ll0 = map.containerPointToLatLng(mp);
      const ll1 = map.containerPointToLatLng([mp.x + HOVER_PX, mp.y + HOVER_PX]);
      const latTol = Math.abs(ll1.lat - ll0.lat);
      const lonTol = Math.abs(ll1.lng - ll0.lng);
      const mLat = ll0.lat, mLon = ll0.lng;

      let best = null, bestDist = HOVER_PX + 1;

      for (let di = 0; di < DEVICES.length; di++) {
        const dev = DEVICES[di];
        if (!visibility[dev.key]) continue;
        const coords = GPX_DATA[dev.key];
        if (!coords) continue;
        for (let i = 0; i < coords.length; i++) {
          const lat = coords[i][0], lon = coords[i][1];
          // lat/lon バウンディングボックスで大半を除外（高速）
          if (lat < mLat - latTol || lat > mLat + latTol) continue;
          if (lon < mLon - lonTol || lon > mLon + lonTol) continue;
          // 通過した点のみピクセル距離を計算
          const px = map.latLngToContainerPoint([lat, lon]);
          const dist = Math.hypot(px.x - mp.x, px.y - mp.y);
          if (dist < bestDist) { bestDist = dist; best = { dev, time: coords[i][2], idx: i, coords }; }
        }
      }

      if (best) {
        const oe = e.originalEvent;
        const label = best.dev.rawLabel || (best.dev.company ? `${best.dev.company} ${best.dev.model}` : best.dev.model);
        // 間引き表示中（サンプリングレート>1）は2点間の実距離が不明瞭になり速度の信頼性が低いため非表示
        const showSpeed = getSampleRate(map.getZoom()) === 1;
        const detail = showSpeed
          ? `${fmtTime(best.time)}<br>${fmtSpeed(nearestSpeed(best.dev.key, best.idx))}`
          : fmtTime(best.time);
        showBalloon(best.dev.color, label, detail, oe.clientX, oe.clientY, 'cursor');
      } else {
        hideBalloon();
      }
    }

    map.on('mousemove', e => {
      _lastHoverE = e;
      if (_hoverRaf) return;
      _hoverRaf = requestAnimationFrame(() => { _hoverRaf = null; doHoverSearch(_lastHoverE); });
    });
    map.on('mouseout', hideBalloon);
    map.on('dragstart', hideBalloon);
    map.on('zoomstart', hideBalloon);

    // ===== クリック位置の住所表示 =====
    // 都道府県・市区町村 → Nominatim、町丁目 → 国土地理院
    let _geoAbort = null;
    map.on('click', async e => {
      const disp = document.getElementById('locationDisplay');
      disp.textContent = '取得中…';
      if (_geoAbort) _geoAbort.abort();
      const ctrl = new AbortController();
      _geoAbort = ctrl;
      const { lat, lng } = e.latlng;
      try {
        const [nomRes, gsiRes] = await Promise.all([
          fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`, { signal: ctrl.signal }),
          fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lng}`, { signal: ctrl.signal }),
        ]);
        const [nomJson, gsiJson] = await Promise.all([nomRes.json(), gsiRes.json()]);

        const a = nomJson.address || {};
        let pref = '';
        if (a.state && /[都道府県]$/.test(a.state)) {
          pref = a.state;
        } else if (a.province && /[都道府県]$/.test(a.province)) {
          pref = a.province;
        } else {
          const dnParts = (nomJson.display_name || '').split(',').map(s => s.trim());
          pref = dnParts.find(s => /[都道府県]$/.test(s)) || a.state || a.province || '';
        }
        // 横浜市・名古屋市・大阪市など政令指定都市の区はaddress.suburbに入る（東京23区はaddress.cityに入るため対象外）
        const ward = (a.suburb && /区$/.test(a.suburb)) ? a.suburb : '';
        const cityArr = [a.city, a.city_district, a.county, a.town, a.village, ward]
          .filter(s => s && s !== pref && !/[都道府県]$/.test(s));
        const city = [...new Set(cityArr)].join('');
        const town = gsiJson?.results?.lv01Nm || a.quarter || (ward ? '' : a.suburb) || a.neighbourhood || '';

        const parts = [pref, city, town].filter(Boolean);
        disp.textContent = parts.length ? parts.join('　') : '—';
      } catch (err) {
        if (err.name !== 'AbortError') disp.textContent = '—';
      }
    });

    // ===== 住所検索 =====
    async function doAddressSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const btn = document.getElementById('searchBtn');
      btn.textContent = '⏳';
      btn.style.pointerEvents = 'none';
      try {
        const isPostal = /^[\d\-]+$/.test(q);
        let searchQuery = q;
        if (isPostal) {
          const zipcode = q.replace(/-/g, '');
          const zipRes = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${encodeURIComponent(zipcode)}`);
          const zipJson = await zipRes.json();
          if (!zipJson.results?.length) { alert('該当する郵便番号が見つかりませんでした。'); return; }
          const r = zipJson.results[0];
          searchQuery = [r.address1, r.address2, r.address3].filter(Boolean).join('');
        }
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchQuery)}&format=json&accept-language=ja&limit=1&countrycodes=jp`;
        const res = await fetch(url);
        const json = await res.json();
        if (!json.length) { alert('該当する住所が見つかりませんでした。'); return; }
        const { lat, lon, boundingbox } = json[0];
        if (boundingbox) {
          const bounds = L.latLngBounds(
            [+boundingbox[0], +boundingbox[2]],
            [+boundingbox[1], +boundingbox[3]]
          );
          const zoom = Math.min(17, Math.max(16, map.getBoundsZoom(bounds)));
          map.setView([+lat, +lon], zoom, { animate: false });
        } else {
          map.setView([+lat, +lon], 17, { animate: false });
        }
      } catch (e) {
        alert('検索に失敗しました。');
      } finally {
        btn.textContent = '🔍';
        btn.style.pointerEvents = '';
      }
    }
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doAddressSearch();
    });
    document.getElementById('searchClear').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchInput').focus();
    });
    document.getElementById('searchBtn').addEventListener('click', doAddressSearch);

    document.getElementById('locationDisplay').addEventListener('click', function () {
      const text = this.textContent;
      if (!text || text === '—' || text === '取得中…') return;
      navigator.clipboard.writeText(text).then(() => {
        this.classList.add('copied');
        setTimeout(() => this.classList.remove('copied'), 100);
      });
    });

    // ===== 初期描画 =====
    updateSidebar();
    setTimeout(() => document.getElementById('loading').classList.add('hide'), 500);

    // ===== サイドバー 左右リサイズ =====
    (function () {
      const resizer = document.getElementById('sidebar-resizer');
      let startX, startW;
      resizer.addEventListener('mousedown', e => {
        startX = e.clientX;
        startW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w')) || 300;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        function onMove(e) {
          const w = Math.max(180, Math.min(700, startW + (e.clientX - startX)));
          document.documentElement.style.setProperty('--sidebar-w', w + 'px');
          map.invalidateSize();
        }
        function onUp() {
          resizer.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
    })();

    // ===== 市区町村ペイン 上下リサイズ =====
    (function () {
      const resizer = document.getElementById('city-resizer');
      let startY, startH;
      resizer.addEventListener('mousedown', e => {
        startY = e.clientY;
        startH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--city-pane-h')) || 220;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        function onMove(e) {
          const h = Math.max(60, Math.min(800, startH - (e.clientY - startY)));
          document.documentElement.style.setProperty('--city-pane-h', h + 'px');
        }
        function onUp() {
          resizer.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
    })();
  </script>

  <!-- Service Worker登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/GPS_tracker_public_beta/sw.js');
    }
  </script>
</body>
